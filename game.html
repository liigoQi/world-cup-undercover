<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>世界杯观赛群卧底计划</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #ededed;
  display: flex; justify-content: center; align-items: center;
}
#phone {
  width: 100%; max-width: 430px; height: 100vh; max-height: 932px;
  background: #ededed;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  box-shadow: 0 0 30px rgba(0,0,0,0.15);
}

/* 顶部标题栏 */
#header {
  background: #1a1a1a; color: #fff;
  padding: 12px 16px; text-align: center;
  font-size: 17px; font-weight: 600;
  flex-shrink: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
}
#header .back { font-size: 16px; color: #fff; cursor: pointer; padding: 4px 8px; }
#header .title { flex: 1; text-align: center; }
#header .members { font-size: 13px; color: #aaa; }
#header .members span { font-size: 11px; color: #888; display: block; }

/* 聊天区域 */
#chat {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  -webkit-overflow-scrolling: touch;
  background: #ededed;
  scroll-behavior: smooth;
}
#chat::-webkit-scrollbar { width: 0; }

/* 消息气泡 */
.msg { margin-bottom: 14px; display: flex; flex-direction: column; }
.msg.other { align-items: flex-start; }
.msg.self { align-items: flex-end; }
.msg.system { align-items: center; margin: 16px 0; }
.msg .sender { font-size: 11px; color: #888; margin-bottom: 2px; padding: 0 4px; }
.msg .avatar-row { display: flex; align-items: flex-start; gap: 8px; }
.msg.self .avatar-row { flex-direction: row-reverse; }
.msg .avatar {
  width: 36px; height: 36px; border-radius: 4px;
  flex-shrink: 0; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: bold;
}
.msg .bubble {
  max-width: 72%; padding: 10px 13px; border-radius: 6px;
  font-size: 15px; line-height: 1.55; word-break: break-word;
  position: relative;
}
.msg.other .bubble { background: #fff; color: #1a1a1a; }
.msg.self .bubble { background: #95ec69; color: #1a1a1a; }
.msg.system .bubble {
  background: #dcdcdc; color: #666; font-size: 12px;
  max-width: 85%; text-align: center; padding: 6px 12px;
  border-radius: 4px; line-height: 1.6; white-space: pre-line;
}
.msg.system.highlight .bubble {
  background: #1a1a1a; color: #f0c040; font-size: 13px;
  border: 1px solid #333;
}
.msg .bubble .multi { margin-bottom: 4px; }
.msg .bubble .multi:last-child { margin-bottom: 0; }

/* 打字指示器 */
.typing { display: flex; gap: 4px; padding: 8px 13px; }
.typing span {
  width: 7px; height: 7px; border-radius: 50%; background: #bbb;
  animation: blink 1.4s infinite both;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

/* 选择按钮 */
.choices-wrap {
  display: flex; flex-direction: column; gap: 8px;
  margin: 8px 0 16px; padding: 10px;
  background: #f8f8f8; border-radius: 8px;
  border: 1px dashed #ddd;
}
.choices-wrap .label {
  font-size: 12px; color: #999; text-align: center; margin-bottom: 2px;
}
.choices-wrap .btn {
  display: block; width: 100%; padding: 10px 14px;
  border: 1px solid #ddd; border-radius: 6px;
  background: #fff; font-size: 14px; color: #333;
  text-align: left; cursor: pointer;
  transition: all 0.15s;
}
.choices-wrap .btn:active { background: #95ec69; border-color: #7bc858; }

/* 系统提示卡片 */
.card {
  background: #fff; border-radius: 10px; padding: 18px;
  margin: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  text-align: center;
}
.card h3 { font-size: 16px; margin-bottom: 8px; }
.card p { font-size: 13px; color: #666; line-height: 1.6; }
.card .big-btn {
  display: inline-block; margin: 10px 6px 0;
  padding: 10px 24px; border-radius: 20px;
  font-size: 14px; cursor: pointer; border: none;
  color: #fff; font-weight: 600;
}
.card .btn-accept { background: #07c160; }
.card .btn-later { background: #ccc; color: #666; }

/* 技能获取 */
.skill-get {
  text-align: center; padding: 10px; margin: 10px 0;
  background: #fffbe6; border-radius: 8px;
  font-size: 13px; color: #b8860b;
}

/* 小游戏覆盖层 */
#minigame-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  display: none;
}
#minigame-overlay.active { display: flex; }
#minigame-box {
  background: #fff; border-radius: 12px; padding: 20px;
  width: 90%; max-width: 380px; text-align: center;
}
#minigame-box h3 { font-size: 16px; margin-bottom: 4px; }
#minigame-box .subtitle { font-size: 12px; color: #999; margin-bottom: 16px; }
#field {
  position: relative; width: 100%; height: 200px;
  background: linear-gradient(to bottom, #4a9e4a 0%, #3d8b3d 30%, #357a35 50%, #3d8b3d 70%, #4a9e4a 100%);
  border-radius: 8px; margin: 0 auto 12px;
  overflow: hidden; touch-action: none;
}
#field .line {
  position: absolute; left: 20px; right: 20px; border-top: 2px solid rgba(255,255,255,0.6);
}
#field .center-circle {
  position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
  border: 2px solid rgba(255,255,255,0.6); border-radius: 50%;
  transform: translate(-50%,-50%);
}
#field .goal { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 28px; }
#field .defender {
  position: absolute; left: 45%; top: 50%; transform: translate(-50%,-50%);
  font-size: 32px; z-index: 2; transition: none;
}
#field .forward {
  position: absolute; left: 60%; top: 50%; transform: translate(-50%,-50%);
  font-size: 32px; z-index: 3; cursor: grab; transition: none;
  user-select: none; -webkit-user-select: none;
}
#field .forward:active { cursor: grabbing; }
#field .ball {
  position: absolute; left: 75%; top: 50%; transform: translate(-50%,-50%);
  font-size: 18px; z-index: 1;
}
#field .offside-line {
  position: absolute; left: 45%; top: 5%; bottom: 5%;
  width: 2px; background: rgba(255,255,0,0.8); z-index: 5;
  border-left: 2px dashed rgba(255,255,0,0.5);
}
#field .hint {
  position: absolute; bottom: 6px; left: 10px; right: 10px;
  font-size: 10px; color: rgba(255,255,255,0.8); text-align: center;
}
#offside-status {
  font-size: 14px; font-weight: bold; margin: 8px 0; padding: 8px;
  border-radius: 6px; transition: all 0.3s;
}
#offside-status.offside { background: #ffe0e0; color: #c00; }
#offside-status.legal { background: #e0ffe0; color: #080; }
#minigame-box .done-btn {
  margin-top: 8px; padding: 10px 30px; border-radius: 20px;
  background: #07c160; color: #fff; border: none; font-size: 15px;
  cursor: pointer;
}

/* 结果页 */
#result-page {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: #1a1a1a; z-index: 200; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  color: #fff; padding: 24px; overflow-y: auto;
}
#result-page.active { display: flex; }
#result-page .result-card {
  background: #2a2a2a; border-radius: 12px; padding: 24px;
  width: 100%; max-width: 360px; text-align: center;
}
#result-page h2 { font-size: 20px; margin-bottom: 16px; color: #f0c040; }
#result-page .meter {
  background: #444; border-radius: 10px; height: 20px; margin: 12px 0; overflow: hidden;
}
#result-page .meter-fill {
  height: 100%; border-radius: 10px;
  background: linear-gradient(90deg, #f0c040, #ff6b35);
  transition: width 1s ease;
}
#result-page .level-badge {
  display: inline-block; padding: 8px 24px; border: 2px solid #f0c040;
  border-radius: 20px; font-size: 18px; font-weight: bold; margin: 8px 0;
}
#result-page .traits { font-size: 13px; color: #ccc; line-height: 1.8; margin: 8px 0; }
#result-page .skills { font-size: 12px; color: #aaa; margin: 8px 0; }
#result-page .eval { font-size: 12px; color: #999; font-style: italic; margin: 10px 0; }
#result-page .actions { margin-top: 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
#result-page .actions button {
  padding: 10px 20px; border-radius: 20px; border: none; font-size: 14px; cursor: pointer;
}
#result-page .btn-share { background: #07c160; color: #fff; }
#result-page .btn-retry { background: #444; color: #fff; }

/* 分享卡 */
#share-card {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 300;
  display: none; align-items: center; justify-content: center;
}
#share-card.active { display: flex; }
#share-card .card-inner {
  background: #fff; border-radius: 12px; padding: 20px;
  width: 320px; text-align: center;
}
#share-card .card-inner h4 { font-size: 15px; margin-bottom: 12px; }
#share-card .card-inner .mini-chat {
  background: #ededed; border-radius: 8px; padding: 10px; text-align: left;
  font-size: 12px; line-height: 1.6;
}
#share-card .card-inner .mini-msg { color: #888; font-size: 11px; }
#share-card .card-inner .mini-sys {
  background: #dcdcdc; padding: 8px; border-radius: 6px;
  margin: 8px 0; text-align: center; font-size: 12px;
}
#share-card .close-btn {
  margin-top: 12px; padding: 8px 20px; border-radius: 16px;
  background: #07c160; color: #fff; border: none; cursor: pointer;
}

/* 知识卡片 */
.knowledge-card {
  background: #fff; border-left: 4px solid #f0c040;
  margin: 8px 0; padding: 10px 12px; border-radius: 4px;
  font-size: 13px; color: #555; line-height: 1.6;
}
.knowledge-card strong { color: #333; }

/* 响应式 */
@media (max-width: 430px) {
  #phone { max-height: 100vh; box-shadow: none; border-radius: 0; }
}
</style>
</head>
<body>

<div id="phone">
  <!-- 顶部栏 -->
  <div id="header">
    <span class="back" onclick="location.reload()">←</span>
    <span class="title">⚽ 2026世界杯观赛群<div class="members"><span>群聊成员 500人</span></div></span>
  </div>

  <!-- 聊天区域 -->
  <div id="chat"></div>

  <!-- 小游戏遮罩 -->
  <div id="minigame-overlay">
    <div id="minigame-box">
      <h3>⚽ 越位判定 — 30秒速通</h3>
      <div class="subtitle">拖动前锋到不同位置，看是不是越位</div>
      <div id="field">
        <div class="line" style="top:50%"></div>
        <div class="center-circle"></div>
        <div class="goal">🥅</div>
        <div class="offside-line" id="offside-line" style="left:45%"></div>
        <div class="defender" id="defender-icon">🛡️</div>
        <div class="forward" id="forward-icon">🏃</div>
        <div class="ball">⚽</div>
        <div class="hint">← 拖动前锋左右移动 →</div>
      </div>
      <div id="offside-status" class="offside">
        🚨 越位！站在防守球员前面接球 = 犯规
      </div>
      <button class="done-btn" id="offside-done" style="display:none" onclick="finishMinigame()">我学会了！</button>
    </div>
  </div>

  <!-- 结果页 -->
  <div id="result-page">
    <div class="result-card" id="result-content"></div>
  </div>

  <!-- 分享卡 -->
  <div id="share-card" onclick="this.classList.remove('active')">
    <div class="card-inner" id="share-inner" onclick="event.stopPropagation()"></div>
  </div>
</div>

<script>
// ==================== 游戏引擎 ====================

const chat = document.getElementById('chat');
const header = document.getElementById('header');

// 头像颜色
const avatars = {
  '战术级理解': { bg: '#4a6fa5', abbr: '战术' },
  '剧本而已': { bg: '#8b5cf6', abbr: '剧本' },
  '天台一位': { bg: '#e74c3c', abbr: '天台' },
  '皇马名宿梅西': { bg: '#e67e22', abbr: '梅东' },
  '踢球是不可能踢球的': { bg: '#2ecc71', abbr: '梗王' },
  '绝不熬夜': { bg: '#34495e', abbr: '熬夜' },
  '诸神黄昏养老院球迷': { bg: '#95a5a6', abbr: '养老' },
  '这战术我看不懂': { bg: '#1abc9c', abbr: '战术' },
  '全员鉴赏中': { bg: '#e91e90', abbr: '颜值' },
  'xG高达0.03': { bg: '#00bcd4', abbr: '数据' },
  '别剧透': { bg: '#ff9800', abbr: '社畜' },
  '进球回放bot': { bg: '#607d8b', abbr: '回放' },
};

function avatarHTML(name) {
  const a = avatars[name] || { bg: '#999', abbr: name.slice(0,2) };
  return `<div class="avatar" style="background:${a.bg}">${a.abbr}</div>`;
}

// 游戏状态
let state = {
  score: 0,
  maxScore: 0,
  choices: [],        // 记录所有选择
  chapterComplete: {}, // 已完成章节
  offsideLearned: false,
  speakingCount: 0,   // 终章发言次数
};

function scrollToBottom() {
  setTimeout(() => {
    chat.scrollTop = chat.scrollHeight;
  }, 50);
}

// 添加一条消息
function addMessage(type, sender, text, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg ${type}`;

      if (type === 'system') {
        div.innerHTML = `<div class="bubble">${text}</div>`;
      } else if (type === 'self') {
        div.innerHTML = `
          <div class="sender">你</div>
          <div class="avatar-row">
            <div class="avatar" style="background:#07c160;font-size:12px;">我</div>
            <div class="bubble">${text}</div>
          </div>`;
      } else {
        const lines = text.split('\n').map(l => `<div class="multi">${l}</div>`).join('');
        div.innerHTML = `
          <div class="sender">${sender}</div>
          <div class="avatar-row">
            ${avatarHTML(sender)}
            <div class="bubble">${lines}</div>
          </div>`;
      }
      chat.appendChild(div);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

// 添加系统高亮卡片
function addSystemCard(text) {
  const div = document.createElement('div');
  div.className = 'msg system highlight';
  div.innerHTML = `<div class="bubble">${text}</div>`;
  chat.appendChild(div);
  scrollToBottom();
}

// 添加技能获取
function addSkill(name) {
  const div = document.createElement('div');
  div.className = 'skill-get';
  div.innerHTML = `📜 <b>获得技能</b><br>✓ ${name}`;
  chat.appendChild(div);
  scrollToBottom();
}

// 添加知识卡片
function addKnowledgeCard(content) {
  const div = document.createElement('div');
  div.className = 'knowledge-card';
  div.innerHTML = content;
  chat.appendChild(div);
  scrollToBottom();
}

// 显示打字指示器
function showTyping(sender) {
  const div = document.createElement('div');
  div.className = 'msg other';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="sender">${sender}</div>
    <div class="avatar-row">
      ${avatarHTML(sender)}
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    </div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// 显示选择按钮
function showChoices(prompt, options) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = 'choices-wrap';
    div.id = 'current-choices';
    let html = `<div class="label">${prompt}</div>`;
    options.forEach((opt, i) => {
      html += `<button class="btn" data-idx="${i}">${opt.label}</button>`;
    });
    div.innerHTML = html;
    chat.appendChild(div);
    scrollToBottom();

    div.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        div.querySelectorAll('.btn').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
        // 高亮选中
        btn.style.background = '#95ec69';
        btn.style.borderColor = '#7bc858';
        resolve(idx);
      });
    });
  });
}

function removeChoices() {
  const el = document.getElementById('current-choices');
  if (el) el.remove();
}

// 发送用户消息
function sendUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg self';
  div.innerHTML = `
    <div class="sender">你</div>
    <div class="avatar-row">
      <div class="avatar" style="background:#07c160;font-size:12px;">我</div>
      <div class="bubble">${text}</div>
    </div>`;
  chat.appendChild(div);
  scrollToBottom();
}

// 清除聊天
function clearChat() {
  chat.innerHTML = '';
}

// 章节标题
function chapterTitle(text, subtitle = '') {
  const div = document.createElement('div');
  div.className = 'msg system highlight';
  div.innerHTML = `<div class="bubble">${text}${subtitle ? '\n' + subtitle : ''}</div>`;
  chat.appendChild(div);
  scrollToBottom();
}

// ==================== 越位小游戏 ====================
let minigameResolve = null;
let offsideLearnedDone = false;

function initMinigame() {
  const forward = document.getElementById('forward-icon');
  const defender = document.getElementById('defender-icon');
  const offsideLine = document.getElementById('offside-line');
  const status = document.getElementById('offside-status');
  const doneBtn = document.getElementById('offside-done');
  const field = document.getElementById('field');

  const defenderLeft = 45; // 防守球员位置百分比
  let forwardLeft = 60;
  let hasBeenLegal = false;

  function updateForward(x) {
    forwardLeft = x;
    forward.style.left = x + '%';
    offsideLine.style.left = defenderLeft + '%';

    if (forwardLeft > defenderLeft) {
      status.className = 'offside';
      status.innerHTML = '🚨 越位！<br><small>站在防守球员前面接球 = 犯规</small>';
    } else {
      status.className = 'legal';
      status.innerHTML = '✅ 合法位置<br><small>和防守球员平齐或靠后 = 好球！</small>';
      hasBeenLegal = true;
    }

    if (hasBeenLegal && forwardLeft <= defenderLeft) {
      doneBtn.style.display = 'inline-block';
    }
  }

  // 重置
  forwardLeft = 60;
  hasBeenLegal = false;
  forward.style.left = '60%';
  offsideLine.style.left = defenderLeft + '%';
  status.className = 'offside';
  status.innerHTML = '🚨 越位！<br><small>站在防守球员前面接球 = 犯规</small>';
  doneBtn.style.display = 'none';

  // 拖动事件
  let dragging = false;

  function getX(e) {
    const rect = field.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(5, Math.min(92, ((clientX - rect.left) / rect.width) * 100));
  }

  forward.addEventListener('touchstart', e => { e.preventDefault(); dragging = true; }, { passive: false });
  forward.addEventListener('mousedown', e => { e.preventDefault(); dragging = true; });

  field.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    updateForward(getX(e));
  }, { passive: false });

  field.addEventListener('mousemove', e => {
    if (!dragging) return;
    updateForward(getX(e));
  });

  const stopDrag = () => { dragging = false; };
  field.addEventListener('touchend', stopDrag);
  field.addEventListener('mouseup', stopDrag);
  field.addEventListener('mouseleave', stopDrag);

  // 点击字段也可移动
  field.addEventListener('click', e => {
    if (e.target === forward || e.target === defender) return;
    updateForward(getX(e));
  });
}

function startMinigame() {
  return new Promise(resolve => {
    minigameResolve = resolve;
    document.getElementById('minigame-overlay').classList.add('active');
    initMinigame();
  });
}

function finishMinigame() {
  document.getElementById('minigame-overlay').classList.remove('active');
  state.offsideLearned = true;
  if (minigameResolve) minigameResolve();
}

// ==================== 章节数据 ====================

function getChoiceText(chapter, choiceIdx) {
  const map = {
    'ch1': [
      '没区别啊，不都是踢球嘛',
      '一个是国家队比赛，一个是俱乐部比赛',
      '欧冠更厉害吧，毕竟俱乐部有钱'
    ],
    'ch2': [
      '这么夸张？我以为就是个体育比赛',
      '我懂了，就像春晚/超级碗那种全民事件对吧',
      '四年一次确实挺珍贵的，错过等四年'
    ],
    'ch3': ['看热闹', '看明星', '看故事', '看战术'],
    'scene1': [
      '这个首发什么意思？完全看不懂',
      '右边路替补确实有点悬，不过对面左后卫也不强',
      '几点开始啊，我刚醒'
    ],

function getChoiceScore(chapter, choiceIdx) {
  const map = {
    'ch1': [0, 2, 0],
    'ch2': [1, 2, 1],
    'ch3': [1, 1, 1, 1],
    'scene1': [0, 3, 1],
    'scene2': [-1, 3, 0],
    'scene3': [-1, 3, 2],
    'scene4': [-1, 3, 1],
    'final1': [5, 0, 3],
    'final2': [8, 2, 5],
    'final3': [8, 3, 5],
    'final4': [10, 6, 5],
    'final5': [10, 5, 2],
  };
  return map[chapter]?.[choiceIdx] || 0;
}

function getChoiceMax(chapter) {
  const map = {
    'ch1': 2, 'ch2': 2, 'ch3': 1,
    'scene1': 3, 'scene2': 3, 'scene3': 3, 'scene4': 3,
    'final1': 5, 'final2': 8, 'final3': 8, 'final4': 10, 'final5': 10,
  };
  return map[chapter] || 0;
}

    { sender: '天台一位', text: '2点开始，我3点起床看结果\n反正前半小时也不会有进球' },
    { sender: '剧本而已', text: '我押巴西2:1法国\n复仇之战' },
    // 发言机会3
    { type: 'speak', id: 'final3' },
    { sender: '全员鉴赏中', text: '法国首发我看了\n这届颜值在线\n尤其是左边锋，我可以' },
    { sender: '皇马名宿梅西', text: '左边锋是谁' },
    { sender: '战术级理解', text: '姆巴佩\n你确定你是在看球' },
    { sender: '皇马名宿梅西', text: '哦！他穿几号' },
    { sender: '踢球是不可能踢球的', text: '群梅西\n姆巴佩穿10号，法国队10号\n下次别说自己是球迷了，说自己是路人' },
    // 发言机会4
    { type: 'speak', id: 'final4' },
    { sender: '诸神黄昏养老院球迷', text: '说起来姆巴佩也28岁了\n这可能是他最后一届巅峰世界杯' },
    { sender: '战术级理解', text: '28岁是黄金年龄\n不是最后一届' },
    { sender: '诸神黄昏养老院球迷', text: '年轻人你不懂\n四年后的事谁说得准呢' },
    { sender: '别剧透', text: '别说了\n四年前我还头发茂密\n现在……' },
    { sender: '踢球是不可能踢球的', text: '世界杯就是人生的度量衡\n测的不是球技，是你的发量' },
    { sender: '这战术我看不懂', text: '比赛马上开始了\n兄弟们看球' },
    { sender: '绝不熬夜', text: '开！始！了！' },
    { sender: '皇马名宿梅西', text: '第一分钟就好激烈\n虽然不知道在看啥但是很激动' },
    // 发言机会5
    { type: 'speak', id: 'final5' },
  ];

  for (const msg of finalMsgs) {
    if (msg.type === 'speak') {
      const opted = await showChoices('🎮 要发言吗？', [
        { label: '💬 发言' },
        { label: '🤫 继续潜水' },
      ]);

      if (opted === 0) {
        removeChoices();
        const choiceLabels = {
          final1: ['A 法国踢巴西啊这都能忘', 'B 我也不知道，同问', 'C 不重要，看就完了'],
          final2: ['A 齐达内98年拿冠军，06年退役，后来当教练', 'B 我也不知道齐达内以前踢球的', 'C 群梅西你认真的吗哈哈哈哈'],
          final3: ['A 我押法国赢，姆巴佩这场状态好', 'B 不预测，看比赛就好', 'C 剧本哥谨慎，上次全错了'],
          final4: ['A 姆巴佩10号，决赛帽子戏法也是10号', 'B 没事群梅西，慢慢学', 'C 你们别欺负群梅西了hhh'],
          final5: ['A 开局高位逼抢很凶，法国队想抢开局', 'B 一起看吧！世界杯要一起看才过瘾', 'C ⚽'],
        };
        const subChoice = await showChoices('你说：', choiceLabels[msg.id].map(l => ({ label: l })));
        state.choices.push({ chapter: msg.id, choice: subChoice });
        state.score += getChoiceScore(msg.id, subChoice);
        state.maxScore += getChoiceMax(msg.id);
        state.speakingCount++;
        sendUserMsg(getChoiceText(msg.id, subChoice));
        removeChoices();
      } else {
        removeChoices();
      }
    } else {
      await addMessage('other', msg.sender, msg.text, 250);
    }
  }
}

// ==================== 结果页 ====================
function showResult() {
  const totalScore = state.score;
  const totalMax = state.maxScore || 1;
  const pct = Math.min(100, Math.round((totalScore / totalMax) * 100));

  let level, title, traits, evalText;
  if (pct < 20) {
    level = 'Lv.1 路人'; title = '你基本上还处于"足球是什么"的阶段。';
    traits = '但至少你已经进了群，迈出了第一步。';
    evalText = '"这人谁？"\n"好像是被拉进来的"\n"没事，慢慢学"';
  } else if (pct < 40) {
    level = 'Lv.2 跟风观众'; title = '你已经知道世界杯是个比赛了。';
    traits = '就是经常在群里说错话。';
    evalText = '"这个发言有点东西（指奇怪的东西）"\n"要不你先潜水看看？"';
  } else if (pct < 60) {
    level = 'Lv.3 伪球迷'; title = '基础知识已经掌握。';
    traits = '但细节容易露馅。需要继续潜伏学习。';
    evalText = '"还行，不太像新手"\n"偶尔会问傻问题，但整体还行"';
  } else if (pct < 80) {
    level = 'Lv.5 合格观众'; title = '能独立看懂比赛，能在群里自如发言。';
    traits = '一般场合不会暴露。';
    evalText = '"这个兄弟是懂球的"\n"发言靠谱"\n"可以一起看球"';
  } else if (pct < 95) {
    level = 'Lv.7 懂哥预备役'; title = '不仅能看懂，还能给别人讲。';
    traits = '群聊存在感强，偶尔输出知识。距离懂哥只差一个博士学位。';
    evalText = '"你是不是偷偷研究了"\n"越来越懂了"\n"再过两年你就是新懂哥"';
  } else {
    level = 'Lv.10 世界杯传教士'; title = '你已经不是在看球。你是在传播世界杯的信仰。';
    traits = '你拉的每个人都会变成球迷。';
    evalText = '"你是不是国际足联的人"\n"这个群靠你维持活跃度"\n"卧底？你是来当群主的吧"';
  }

  // 彩蛋检测
  const allChoices = state.choices;
  const allWrong = allChoices.length > 0 && allChoices.every(c => getChoiceScore(c.chapter, c.choice) <= 0);
  const allRight = allChoices.length > 0 && allChoices.every(c => {
    const max = getChoiceMax(c.chapter);
    return getChoiceScore(c.chapter, c.choice) >= max;
  });

  let easterEgg = '';
  if (allWrong) {
    easterEgg = `
      <div style="margin-top:16px;padding:12px;background:#333;border-radius:8px;text-align:left;font-size:12px;line-height:1.8;">
      <strong>🥚 彩蛋：全选错误答案</strong><br>
      <span style="color:#2ecc71">踢球是不可能踢球的：</span>兄弟，你是我见过最诚实的新手。每一个坑都踩了，但不知道为什么，我很尊重你。<br>
      <span style="color:#e67e22">皇马名宿梅西：</span>终于有人比我还不懂了，欢迎加入群梅西联盟。<br>
      <span style="color:#95a5a6">诸神黄昏养老院球迷：</span>没关系，每个人都是这样过来的。
      </div>`;
  } else if (allRight) {
    easterEgg = `
      <div style="margin-top:16px;padding:12px;background:#333;border-radius:8px;text-align:left;font-size:12px;line-height:1.8;">
      <strong>🥚 彩蛋：全程零失误</strong><br>
      <span style="color:#4a6fa5">战术级理解：</span>等等，你是不是其实很懂球<br>
      <span style="color:#2ecc71">踢球是不可能踢球的：</span>卧底？你这是来当教授的！群主，这有个冒充新人的<br>
      <span style="color:#1abc9c">这战术我看不懂：</span>我怀疑你是退役球员。哪个队的，老实交代
      </div>`;
  } else if (state.speakingCount === 0) {
    easterEgg = `
      <div style="margin-top:16px;padding:12px;background:#333;border-radius:8px;text-align:left;font-size:12px;line-height:1.8;">
      <strong>🥚 隐藏成就：潜行之王</strong><br>
      <span style="color:#2ecc71">踢球是不可能踢球的：</span>这个新人从头到尾没说过一句话，真正的隐形人<br>
      <span style="color:#4a6fa5">战术级理解：</span>潜伏的最高境界：不说话。但我不确定你学到了什么……
      </div>`;
  }

  const skillsList = [];
  if (state.chapterComplete.ch1) skillsList.push('国家队与俱乐部');
  if (state.chapterComplete.ch2) skillsList.push('世界杯的重要性');
  if (state.chapterComplete.ch3) skillsList.push('观赛视角');
  if (state.offsideLearned) skillsList.push('越位');
  skillsList.push('群聊生存术');

  const resultHTML = `
    <h2>⚽ 观赛群卧底计划</h2>
    <p style="color:#aaa;font-size:13px;">结业报告</p>
    <div style="margin:12px 0;">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:4px;">
        <span>懂球浓度</span><span>${pct}%</span>
      </div>
      <div class="meter"><div class="meter-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="level-badge">${level}</div>
    <p style="font-size:14px;margin:8px 0;color:#ddd;">${title}</p>
    <div class="traits">${traits}</div>
    <div class="skills" style="text-align:left;margin:12px 0;">
      <strong style="color:#f0c040;">已获得技能：</strong><br>
      ${skillsList.map(s => `✓ ${s}`).join('<br>')}
    </div>
    <div style="margin:8px 0;">
      <span style="font-size:13px;color:#f0c040;">卧底成功率：${pct}%</span>
    </div>
    <div class="eval">群友评价：<br>${evalText.replace(/\n/g, '<br>')}</div>
    ${easterEgg}
    <div class="actions">
      <button class="btn-share" onclick="showShareCard(${pct}, '${level}')">📤 查看分享卡</button>
      <button class="btn-retry" onclick="location.reload()">🔄 再来一次</button>
    </div>
  `;

  document.getElementById('result-content').innerHTML = resultHTML;
  document.getElementById('result-page').classList.add('active');
}

function showShareCard(pct, level) {
  document.getElementById('share-inner').innerHTML = `
    <h4>📤 分享卡</h4>
    <div class="mini-chat">
      <div style="text-align:center;color:#888;font-size:11px;margin-bottom:6px;">⚽ 世界杯观赛群（499）</div>
      <div class="mini-sys">
        🏅 卧底任务完成<br>
        懂球浓度 ${'█'.repeat(Math.round(pct/10))}${'░'.repeat(10-Math.round(pct/10))} ${pct}%<br>
        身份：${level}<br>
        卧底成功率：${pct}%<br>
        "差点被当成真球迷"
      </div>
      <div style="text-align:center;color:#888;font-size:10px;margin-top:8px;">你也来测测？扫码开启卧底计划 →</div>
    </div>
    <button class="close-btn" onclick="document.getElementById('share-card').classList.remove('active')">关闭</button>
  `;
  document.getElementById('share-card').classList.add('active');
}

// ==================== 主流程 ====================
async function main() {
  clearChat();

  // 序章
  const accepted = await runPrologue();
  if (!accepted) return;

  await new Promise(r => setTimeout(r, 600));

  // 第一章
  await runChapter1();
  state.chapterComplete.ch1 = true;
  await new Promise(r => setTimeout(r, 800));

  // 第二章
  await runChapter2();
  state.chapterComplete.ch2 = true;
  await new Promise(r => setTimeout(r, 800));

  // 第三章
  await runChapter3();
  state.chapterComplete.ch3 = true;
  await new Promise(r => setTimeout(r, 800));

  // 第四章
  await runChapter4();
  await new Promise(r => setTimeout(r, 800));

  // 第六章（剧本第五章不存在，直接第六章）
  await runChapter6();
  await new Promise(r => setTimeout(r, 1000));

  // 终章
  await runFinalChapter();
  await new Promise(r => setTimeout(r, 800));

  // 结果
  addSystemCard('━━━━━━━━━━━━━━━━━━\n  测试结束\n\n  正在计算你的\n  卧底成功率……\n━━━━━━━━━━━━━━━━━━');
  await new Promise(r => setTimeout(r, 1500));
  showResult();
}

// 启动
main().catch(console.error);
</script>
